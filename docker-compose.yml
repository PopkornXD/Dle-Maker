version: "3"

services:
mariadb:
  image: mariadb:11
  restart: always
  env_file:
    - .env.db
  volumes:
    - dbdata:/var/lib/mysql
  ports:
    - "3306:3306"

  web:
    build: .
    restart: always
    depends_on:
      - mariadb
    env_file:
      - .env
    ports:
      - "3000:3000"

volumes:
  dbdata:
